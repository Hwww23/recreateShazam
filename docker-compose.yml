services:

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soundmatch
    volumes:
      # persist database data so it survives container restarts
      - postgres_data:/var/lib/postgresql/data
      # run our init.sql on first startup
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"  # expose on 5433 to avoid clashing with your local postgres

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/soundmatch
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_tmp:/tmp/uploads
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    # wait for postgres to be ready before starting
    command: >
      sh -c "sleep 3 && uvicorn main:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/soundmatch
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_tmp:/tmp/uploads
    depends_on:
      - db
      - redis
    command: >
      sh -c "sleep 5 && celery -A tasks worker --loglevel=info --concurrency=2"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  uploads_tmp: