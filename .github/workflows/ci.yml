name: SoundMatch CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      # Spin up a real PostgreSQL for testing
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: soundmatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create database tables
        working-directory: backend
        env:
          SHARD_0_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_1_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_2_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_3_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
        run: psql -U postgres -h localhost -d soundmatch_test -f init.sql
        env:
          PGPASSWORD: postgres

      - name: Run tests
        working-directory: backend
        env:
          SHARD_0_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_1_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_2_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          SHARD_3_URL: postgresql://postgres:postgres@localhost:5432/soundmatch_test
          REDIS_URL: redis://localhost:6379
        run: pytest test_fingerprint.py -v

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build